services:
  - type: web
    name: xhamster-downloader-api
    runtime: python
    region: oregon
    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    preDeployCommand: |
      apt-get update
      apt-get install -y ffmpeg

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
